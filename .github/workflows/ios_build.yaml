name: iOS Build & Upload to App Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Read Flutter version from .flutter-version file
      - name: Read Flutter version
        run: |
          FLUTTER_VERSION=$(cat .flutter-version)
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
          echo "Using Flutter $FLUTTER_VERSION"

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      # 4. Install Flutter dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # 4.5. Patch incompatible pub cache packages
      # Replicates local pub cache fixes so CI doesn't need source code changes.
      # dropdown_search 3.0.1 uses deprecated TextTheme getters removed in Flutter 3.x,
      # isAlwaysShown renamed to thumbVisibility, and showTrackOnHover removed from Scrollbar.
      # simple_animations 4.2.0 has a ValueListenable/ValueNotifier type mismatch
      # due to a Flutter SDK change in TickerMode.getNotifier return type.
      - name: Patch pub cache packages
        run: |
          PUB_CACHE=$HOME/.pub-cache/hosted/pub.dev

          # --- dropdown_search 3.0.1 ---
          sed -i '' 's/textTheme\.subtitle2/textTheme.bodySmall/g' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/dropdown_search.dart"
          sed -i '' 's/textTheme\.subtitle1/textTheme.titleMedium/g' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/dropdown_search.dart"
          sed -i '' 's/textTheme\.subtitle1/textTheme.titleMedium/g' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/src/selection_widget.dart"
          sed -i '' 's/textTheme\.subtitle1/textTheme.titleMedium/g' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/src/popupMenu.dart"
          sed -i '' 's/isAlwaysShown/thumbVisibility/g' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/src/selection_widget.dart"
          sed -i '' 's/isAlwaysShown/thumbVisibility/g' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/src/properties/scrollbar_props.dart"
          # Remove showTrackOnHover — no longer a valid Scrollbar parameter
          sed -i '' '/showTrackOnHover/d' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/src/selection_widget.dart"
          sed -i '' '/showTrackOnHover/d' \
            "$PUB_CACHE/dropdown_search-3.0.1/lib/src/properties/scrollbar_props.dart"

          # --- simple_animations 4.2.0 ---
          # Cast the return value since TickerMode.getNotifier now returns ValueNotifier
          sed -i '' 's/final ValueListenable<bool> newNotifier = TickerMode.getNotifier(context);/final ValueNotifier<bool> newNotifier = TickerMode.getNotifier(context) as ValueNotifier<bool>;/g' \
            "$PUB_CACHE/simple_animations-4.2.0/lib/anicoto/animation_mixin.dart"
          sed -i '' 's/ValueListenable<bool>? _tickerModeNotifier/ValueNotifier<bool>? _tickerModeNotifier/g' \
            "$PUB_CACHE/simple_animations-4.2.0/lib/anicoto/animation_mixin.dart"

          echo "✅ Pub cache patches applied"

      # 5. Install CocoaPods dependencies
      - name: Install CocoaPods
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
          echo "✅ CocoaPods install complete"

      # 6. Extract version info from pubspec.yaml
      - name: Extract version info
        id: version
        run: |
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> $GITHUB_ENV
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version $VERSION ($GITHUB_RUN_NUMBER)"

      # 7. Import signing certificate
      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          echo "Certificate file size: $(wc -c < certificate.p12) bytes"
          openssl pkcs12 -in certificate.p12 -noout -passin pass:"$CERTIFICATE_PASSWORD" 2>&1 && \
            echo "✅ Certificate is valid" || echo "❌ Certificate is invalid or password is wrong"

          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          echo "Certificates available for code signing:"
          security find-identity -v -p codesigning build.keychain

      # 8. Install provisioning profile
      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          echo "Installed provisioning profile:"
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision \
            | grep -A1 '<key>Name</key>' | tail -1

      # 9. Build IPA
      - name: Build IPA
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          PROFILE_UUID=$(security cms -D \
            -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision \
            | plutil -extract UUID raw -)
          echo "Using profile UUID: $PROFILE_UUID"

          cat > /tmp/signing_override.xcconfig << EOF
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution: TECHBIZ LIMITED (45XP48S67P)
          DEVELOPMENT_TEAM = 45XP48S67P
          PROVISIONING_PROFILE = $PROFILE_UUID
          PROVISIONING_PROFILE_SPECIFIER = Enforcer App Store Profile
          FLUTTER_BUILD_NUMBER = ${{ env.BUILD_NUMBER }}
          FLUTTER_BUILD_NAME = ${{ env.VERSION }}
          EOF

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/archive/Runner.xcarchive \
            -xcconfig /tmp/signing_override.xcconfig \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa

      # 10. Save IPA as artifact
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.VERSION }}-${{ env.BUILD_NUMBER }}.ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7

      # 11. Install Apple Transporter
      - name: Install Apple Transporter
        run: |
          curl -O https://itmstransporter.itunes.apple.com/downloads/Transporter-latest.dmg
          hdiutil attach Transporter-latest.dmg -quiet
          cp -R "/Volumes/Transporter/Transporter.app" /Applications/
          hdiutil detach "/Volumes/Transporter" -quiet

      # 12. Upload to App Store Connect via Transporter CLI
      - name: Upload to App Store Connect
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_BASE64: ${{ secrets.APP_STORE_API_KEY_BASE64 }}
          APP_APPLE_ID: ${{ vars.APP_APPLE_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8

          BUNDLE_ID=$(grep -m 1 'PRODUCT_BUNDLE_IDENTIFIER' \
            ios/Runner.xcodeproj/project.pbxproj \
            | awk -F '= ' '{print $2}' \
            | tr -d ';' \
            | xargs)

          echo "Detected bundle ID: $BUNDLE_ID"
          echo "Uploading version $VERSION build $BUILD_NUMBER"

          /Applications/Transporter.app/Contents/itms/bin/iTMSTransporter \
            -m upload \
            -f build/ios/ipa/*.ipa \
            -apiKey "$APP_STORE_API_KEY_ID" \
            -apiIssuer "$APP_STORE_ISSUER_ID" \
            -v detailed

      # 13. Cleanup keychain
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true